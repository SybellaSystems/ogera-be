                description: Unauthorized
            404: 
                description: User not found
            500:
                description: Internal server error

# [GET] Protected Test Route
/auth/me:
    get:
        tags:
            - Auth
        summary: Test protected route
        description: A test endpoint to verify authentication is working
        security:
            - bearerAuth: []
        responses:
            200:
                description: Protected API working
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                user:
                                    type: object
            401:
                description: Unauthorized
            500:
                description: Internal server error