# [POST] Create Job
/jobs:
    post:
        tags:
            - Jobs
        summary: Create a new job posting
        description: Creates a new job posting (requires authentication and create permission)
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/CreateJob'
        responses:
            201:
                description: Job created successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/JobResponse'
            400:
                description: Bad Request
            401:
                description: Unauthorized
            403:
                description: Forbidden - Insufficient permissions
            500:
                description: Internal server error

    # [GET] Get All Jobs
    get:
        tags:
            - Jobs
        summary: Get all jobs
        description: Retrieves all job postings (requires authentication and view permission)
        security:
            - bearerAuth: []
        responses:
            200:
                description: Jobs retrieved successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/JobsListResponse'
            401:
                description: Unauthorized
            403:
                description: Forbidden - Insufficient permissions
            500:
                description: Internal server error

# [GET] Get Job by ID
/jobs/{id}:
    get:
        tags:
            - Jobs
        summary: Get a specific job by ID
        description: Retrieves a single job posting by its ID (requires authentication and view permission)
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: string
                  format: uuid
              description: Job ID
        responses:
            200:
                description: Job retrieved successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/JobResponse'
            401:
                description: Unauthorized
            403:
                description: Forbidden - Insufficient permissions
            404:
                description: Job not found
            500:
                description: Internal server error

    # [PUT] Update Job
    put:
        tags:
            - Jobs
        summary: Update a job posting
        description: Updates an existing job posting (requires authentication and edit permission)
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: string
                  format: uuid
              description: Job ID
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/UpdateJob'
        responses:
            200:
                description: Job updated successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/JobResponse'
            400:
                description: Bad Request
            401:
                description: Unauthorized
            403:
                description: Forbidden - Insufficient permissions
            404:
                description: Job not found
            500:
                description: Internal server error

    # [DELETE] Delete Job
    delete:
        tags:
            - Jobs
        summary: Delete a job posting
        description: Deletes a job posting (requires authentication and delete permission)
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: string
                  format: uuid
              description: Job ID
        responses:
            200:
                description: Job deleted successfully
            401:
                description: Unauthorized
            403:
                description: Forbidden - Insufficient permissions
            404:
                description: Job not found
            500:
                description: Internal server error

