# [POST] Create Role
/roles/create:
    post:
        tags:
            - Roles
        summary: Create a new role
        description: Creates a new role with permissions
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/CreateRole'
        responses:
            201:
                description: Role created successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoleResponse'
            400:
                description: Bad Request
            401:
                description: Unauthorized
            500:
                description: Internal server error

# [GET] Get All Roles
/roles:
    get:
        tags:
            - Roles
        summary: Get all roles
        description: Retrieves all roles in the system
        security:
            - bearerAuth: []
        responses:
            200:
                description: Roles retrieved successfully
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/RoleData'
            400:
                description: Bad Request
            401:
                description: Unauthorized
            500:
                description: Internal server error

# [GET] Get Role by ID
/roles/{id}:
    get:
        tags:
            - Roles
        summary: Get a specific role by ID
        description: Retrieves a single role by its ID
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: string
                  format: uuid
              description: Role ID
        responses:
            200:
                description: Role retrieved successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoleData'
            401:
                description: Unauthorized
            404:
                description: Role not found
            500:
                description: Internal server error

    # [PUT] Update Role
    put:
        tags:
            - Roles
        summary: Update a role
        description: Updates an existing role
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: string
                  format: uuid
              description: Role ID
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/UpdateRole'
        responses:
            200:
                description: Role updated successfully
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoleResponse'
            400:
                description: Bad Request
            401:
                description: Unauthorized
            404:
                description: Role not found
            500:
                description: Internal server error

    # [DELETE] Delete Role
    delete:
        tags:
            - Roles
        summary: Delete a role
        description: Deletes a role from the system
        security:
            - bearerAuth: []
        parameters:
            - in: path
              name: id
              required: true
              schema:
                  type: string
                  format: uuid
              description: Role ID
        responses:
            200:
                description: Role deleted successfully
            400:
                description: Bad Request
            401:
                description: Unauthorized
            404:
                description: Role not found
            500:
                description: Internal server error

